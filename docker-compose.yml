name: ${PROJECT_SLUG:-symfony-app}

services:
    php:
        container_name: ${PROJECT_SLUG:-symfony-app}-php
        restart: unless-stopped
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
            args:
                PHP_VERSION: ${PHP_VERSION:-8.2}
                USER_ID: ${USER_ID:-1000}
                GROUP_ID: ${GROUP_ID:-1000}
        environment:
            APP_ENV: ${APP_ENV:-dev}
            COMPOSER_CACHE_DIR: /composer/cache
            XDEBUG_MODE: ${XDEBUG_MODE:-off}
            INSTALL_SYMFONY_CLI: ${INSTALL_SYMFONY_CLI:-0}
        volumes:
            - ./app:/var/www/html:cached
            - ./.docker/php/conf/php.ini:/usr/local/etc/php/conf.d/99-symfony.ini:ro
            - ./.docker/php/conf/opcache.ini:/usr/local/etc/php/conf.d/98-opcache.ini:ro
            - ./.docker/php/conf/apcu.ini:/usr/local/etc/php/conf.d/97-apcu.ini:ro
            - composer_cache:/root/.composer/cache
        networks:
            - internal
        extra_hosts:
            - "host.docker.internal:host-gateway"
    
    web-nginx:
        profiles: [ "nginx" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-web
        restart: unless-stopped
        image: nginx:alpine
        depends_on:
            php:
                condition: service_healthy
        ports:
            - "${WEB_EXTERNAL_PORT:-8080}:80"
        volumes:
            - ./app:/var/www/html:cached
            - ./.docker/web/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./.docker/web/nginx/vhost.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_logs:/var/log/nginx
        networks:
            - internal
        healthcheck:
            test: [ "CMD-SHELL", "curl -s http://localhost/ || exit 1" ]
            interval: 30s
            timeout: 10s
            retries: 3
    
    web-apache:
        profiles: [ "apache" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-web
        restart: unless-stopped
        build:
            context: .
            dockerfile: .docker/web/apache/Dockerfile
        depends_on:
            php:
                condition: service_healthy
        ports:
            - "${WEB_EXTERNAL_PORT:-8080}:80"
        volumes:
            - ./app:/var/www/html:cached
            - ./.docker/web/apache/vhost.conf:/usr/local/apache2/conf/extra/vhost.conf:ro
        command: >
            sh -c "echo 'Include conf/extra/vhost.conf' >> /usr/local/apache2/conf/httpd.conf && httpd-foreground"
        networks:
            - internal
        healthcheck:
            test: [ "CMD-SHELL", "curl -s http://localhost/ || exit 1" ]
            interval: 30s
            timeout: 10s
            retries: 3
    
    db-mariadb:
        profiles: [ "mariadb" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-db
        restart: unless-stopped
        image: mariadb:11.8.6
        environment:
            MYSQL_DATABASE: ${APP_DB_NAME:-app_db}
            MYSQL_USER: ${APP_DB_USER:-db_user}
            MYSQL_PASSWORD: ${APP_DB_PASSWORD:-db_password}
            MYSQL_ROOT_PASSWORD: ${APP_DB_PASSWORD:-db_password}
        ports:
            - "${DB_EXTERNAL_PORT:-3306}:${DB_INTERNAL_PORT:-3306}"
        volumes:
            - ./.docker/sql/mariadb.custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
            - db_data:/var/lib/mysql
        networks:
            - internal
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
    
    db-postgres:
        profiles: [ "postgres" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-db
        restart: unless-stopped
        image: postgres:18.3-alpine
        environment:
            POSTGRES_DB: ${APP_DB_NAME:-app_db}
            POSTGRES_USER: ${APP_DB_USER:-db_user}
            POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-db_password}
        ports:
            - "${DB_EXTERNAL_PORT:-5432}:${DB_INTERNAL_PORT:-5432}"
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - internal
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${APP_DB_USER:-db_user} -d ${APP_DB_NAME:-app_db}" ]
            interval: 30s
            timeout: 10s
            retries: 3
    
    phpmyadmin:
        profiles: [ "mariadb" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-phpmyadmin
        restart: unless-stopped
        image: phpmyadmin:latest
        depends_on:
            db-mariadb:
                condition: service_healthy
        environment:
            PMA_HOST: db-mariadb
            PMA_PORT: ${DB_INTERNAL_PORT:-3306}
            MYSQL_USERNAME: ${APP_DB_USER:-db_user}
            MYSQL_PASSWORD: ${APP_DB_PASSWORD:-db_password}
            PMA_USERNAME: ${APP_DB_USER:-db_user}
            PMA_PASSWORD: ${APP_DB_PASSWORD:-db_password}
            UPLOAD_LIMIT: 256M
        ports:
            - "${PMA_EXTERNAL_PORT:-8081}:80"
        networks:
            - internal
    
    pgadmin:
        profiles: [ "postgres" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-pgadmin
        restart: unless-stopped
        image: dpage/pgadmin4:latest
        depends_on:
            db-postgres:
                condition: service_healthy
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@${PROJECT_SLUG:-symfony-app}.docker
            PGADMIN_DEFAULT_PASSWORD: pgadmin_pass
        ports:
            - "${PMA_EXTERNAL_PORT:-8081}:80"
        networks:
            - internal
    
    redis:
        profiles: [ "redis" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-redis
        restart: unless-stopped
        image: redis:8.6-alpine
        ports:
            - "${REDIS_EXTERNAL_PORT:-6379}:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes --maxmemory 256M --maxmemory-policy allkeys-lru
        networks:
            - internal
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 30s
            timeout: 10s
            retries: 3
    
    node:
        profiles: [ "node" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-node
        build:
            context: .
            dockerfile: .docker/node/Dockerfile
            args:
                USER_ID: ${USER_ID:-1000}
                GROUP_ID: ${GROUP_ID:-1000}
        working_dir: /var/www/html
        tty: true
        environment:
            NODE_ENV: ${NODE_ENV:-dev}
        volumes:
            - ./app:/var/www/html:cached
            - node_modules:/var/www/html/node_modules
            - node_cache:/home/www-data/.npm
        networks:
            - internal
        ports:
            - "${NODE_EXTERNAL_PORT:-3000}:3000"
        healthcheck:
            test: [ "CMD-SHELL", "npm -v || exit 1" ]
            interval: 30s
            timeout: 10s
            retries: 3

    mailpit:
        profiles: [ "mailpit" ]
        container_name: ${PROJECT_SLUG:-symfony-app}-mailpit
        restart: unless-stopped
        image: axllent/mailpit:latest
        environment:
            MP_MAX_MESSAGES: 500
            MP_DATA_FILE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        ports:
            - "1025:1025" # SMTP
            - "8025:8025" # Web UI
        volumes:
            - mailpit_data:/data
        networks:
            - internal
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8025/ || exit 1" ]
            interval: 30s
            timeout: 10s
            retries: 3

networks:
    internal:
        driver: bridge
        name: ${PROJECT_SLUG:-symfony-app}_net

volumes:
    composer_cache:
        name: ${PROJECT_SLUG:-symfony-app}_composer_cache
    nginx_logs:
        name: ${PROJECT_SLUG:-symfony-app}_nginx_logs
    db_data:
        name: ${PROJECT_SLUG:-symfony-app}_db_data
    redis_data:
        name: ${PROJECT_SLUG:-symfony-app}_redis_data
    mailpit_data:
        name: ${PROJECT_SLUG:-symfony-app}_mailpit_data
    node_cache:
        name: ${PROJECT_SLUG:-symfony-app}_node_cache
    node_modules:
        name: ${PROJECT_SLUG:-symfony-app}_node_modules
